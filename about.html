<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cartoon Prompt Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#dbeafe;
  --bg2:#fef3c7;
  --card:#ffffff;
  --prompt:#ecfeff;
  --btn:#fde047;
  --text:#000;
}

body.dark{
  --bg1:#151c3be2;
  --bg2:#1a2a51b8;
  --blob1:#1e293b;
  --blob2:#4b5a95;
}

body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  padding:90px 40px 40px;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  transition:0.3s;

  overflow:hidden;   /* ⭐ ADD HERE */
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:20px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  padding:8px 16px;
  border-radius:999px;
  background:linear-gradient(135deg,#ffd83b,#efd13c);
  border:3px solid #000;
  box-shadow:4px 4px 0 #000;
  font-weight:700;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.logo:hover{
  transform:translate(-2px,-2px);
}

body.dark .logo{
  background:linear-gradient(135deg,#22d3ee,#22d3ee);
}

/* iOS TOGGLE */
.toggle-ios input{display:none;}
.toggle-ios label{
  width:52px;
  height:30px;
  background:#e5e7eb;
  border-radius:999px;
  display:block;
  position:relative;
  cursor:pointer;
  border:2px solid #000;
  box-shadow:3px 3px 0 #000;
}
.toggle-ios label::after{
  content:"";
  width:22px;
  height:22px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  border:2px solid #000;
  transition:0.3s;
}
.toggle-ios input:checked + label{
  background:#22d3ee;
}
.toggle-ios input:checked + label::after{
  transform:translateX(22px);
}

/* MAIN */
.main{
  display:flex;
  justify-content:center;
  align-items:center;
}

.about-card{
  max-width:560px;
  background:var(--card);
  border:4px solid #000;
  border-radius:28px;
  padding:30px;
  box-shadow:8px 8px 0 #000;
  text-align:center;
}

.about-card h1{
  margin-top:0;
  font-size:30px;
}

.about-card p{
  font-size:16px;
  line-height:1.7;
  margin:14px 0;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:16px;
  left:16px;
  right:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BACK BUTTON */
.back-btn{
  padding:10px 14px;
  border-radius:999px;
  border:3px solid #000;
  background:#fff;
  font-weight:600;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
  transition:0.2s;
}

.back-btn:hover{
  transform:translate(-2px,-2px);
}

.back-btn:active{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 #000;
}

/* SOCIAL ICONS */
.socials{
  display:flex;
  gap:12px;
}

.social{
  width:44px;
  height:44px;
  border-radius:50%;
  border:3px solid #000;
  overflow:hidden;              /* ⭐ IMPORTANT */
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:4px 4px 0 #000;
  transition:0.2s;
}

.social img{
  width:100%;
  height:100%;
  object-fit:cover;     /* ⭐ fills circle nicely */
  pointer-events:none;
}


.social:hover{
  transform:translate(-2px,-2px);
}

.social:active{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 #000;
}

/* COLORS */
.twitter{ background:#bae6fd; }
.linkedin{ background:#bfdbfe; }
.github{ background:#e5e7eb; }

body.dark .social{
  background:#22d3ee;
}

@media (min-width:768px){
  body{
    overflow:hidden;
  }
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
  
  <span class="logo-text">RANJIT</span>
</div>

  <div class="toggle-ios">
  <input type="checkbox" id="themeToggle" onclick="toggleMode()">
  <label for="themeToggle"></label>
</div>

</div>

<!-- MAIN -->
<div class="main">
  <div class="about-card">
    <h1>About My Prompto</h1>
    <p>
      my prompto is a fun, cartoon-styled collection of AI image prompts
      designed to inspire creativity and experimentation.
    </p>
    <p>
      This project focuses on clean UI, playful animations, and a
      mobile-first experience while keeping everything simple and fast.
    </p>
    <p>
      Built with ❤️ by <strong>Ranjit</strong>.
    </p>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">

  <button class="back-btn" onclick="goHome()">Back</button>

  <div class="socials">
  <div class="social twitter" onclick="openLink('https://x.com/Mr_Ranjit1')">
    <img src="icons/x2.png" alt="Twitter">
  </div>

  <div class="social linkedin" onclick="openLink('https://www.linkedin.com/in/ranjit-das-0a32773a4/')">
    <img src="icons/linkedin3.png" alt="LinkedIn">
  </div>

  <div class="social github" onclick="openLink('https://github.com/QuantumCode001')">
    <img src="icons/github2.png" alt="GitHub">
  </div>
</div>


<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}

function goHome(){
  window.location.href = "index.html";
}

function openLink(url){
  window.open(url, "_blank");
}

function toggleMode(){
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
}

(function(){
  const savedTheme = localStorage.getItem("theme");
  if(savedTheme === "dark"){
    document.body.classList.add("dark");
    const toggle = document.getElementById("themeToggle");
    if(toggle) toggle.checked = true;
  }
})();



</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cartoon Prompt Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#dbeafe;
  --bg2:#fef3c7;
  --card:#ffffff;
  --prompt:#ecfeff;
  --btn:#fde047;
  --text:#000;
}

body.dark{
  --bg1:#151c3be2;
  --bg2:#1a2a51b8;
  --blob1:#1e293b;
  --blob2:#4b5a95;
}



body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  padding:90px 40px 40px;

  /* 🎨 AESTHETIC BACKGROUND */
  background:
    linear-gradient(135deg,var(--bg1),var(--bg2));

  transition:0.3s;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:20px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.logo{
  font-weight:700;
  font-size:22px;
  background:#000;
  color:#fff;
  padding:6px 16px;
  border-radius:16px;
}

.toggle{
  cursor:pointer;
  padding:10px 16px;
  border:3px solid #000;
  border-radius:16px;
  background:var(--btn);
  font-weight:600;
  box-shadow:4px 4px 0 #000;
}



/* MAIN */
.main{
  min-height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TABS */
.tabs{
  display:grid;
  grid-template-columns:1fr;
  gap:28px;
  width:100%;
  max-width:440px;
}

/* BIG TAB BASE */
.big-tab{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:28px 24px;
  border-radius:28px;
  border:4px solid #000;
  background:#fff;
  font-size:22px;
  font-weight:700;
  cursor:pointer;
  box-shadow:8px 8px 0 #000;
  transition:0.25s;
}

.big-tab:hover{
  transform:translate(-4px,-4px);
}

/* LEFT TEXT */
.tab-text span{
  display:block;
  margin-top:6px;
  font-size:14px;
  font-weight:400;
}

/* RIGHT ICON */
.tab-icon{
  font-size:28px;
}

.tab-icon{
  width:42px;
  height:42px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;

}

.tab-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}

/* TAB COLORS */
.nano{
  background:#fde047;   /* 🟡 yellow */
}

.chatgpt{
  background:#52bf7a;   /* 🟢 green */
}


/* 🍏 iOS STYLE TOGGLE */
.toggle-ios{
  position:relative;
}

.toggle-ios input{
  display:none;
}

.toggle-ios label{
  width:52px;
  height:30px;
  background:#e5e7eb;
  border-radius:999px;
  display:block;
  position:relative;
  cursor:pointer;
  border:2px solid #000;
  box-shadow:3px 3px 0 #000;
  transition:0.3s;
}

/* knob */
.toggle-ios label::after{
  content:"";
  width:22px;
  height:22px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:0.3s;
  border:2px solid #000;
}

/* ON STATE */
.toggle-ios input:checked + label{
  background:#22d3ee;
}

.toggle-ios input:checked + label::after{
  transform:translateX(22px);
}


/* 🌈 BEAUTIFUL LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 16px;
  border-radius:999px;

  background:
    linear-gradient(135deg,#ffd83b,#efd13cd8);
  
  border:3px solid #000;
  box-shadow:4px 4px 0 #000;

  font-weight:700;
  font-size:18px;
  letter-spacing:0.3px;
}

/* icon bubble */
.logo-icon{
  width:30px;
  height:30px;
  background:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #000;
  font-size:16px;
}

/* text */
.logo-text{
  color:#020617;
}

/* 🌙 NIGHT MODE LOGO (still colorful, not dull) */
body.dark .logo{
  background:
    linear-gradient(135deg,#22d3ee,#22d3ee);
}

body.dark .logo-text{
  color:#020617;
}

.logo{
  transition:transform 0.2s ease;
}

.logo:hover{
  transform:translate(-2px,-2px);
}
/*  ABOUT BUTTON  */
.back-btn{
  position:fixed;
  bottom:16px;
  right:16px;      
  left:auto;      

  z-index:20;
  display:flex;
  align-items:center;
  gap:6px;

  padding:10px 14px;
  border-radius:999px;

  background:linear-gradient(135deg,#e6e6e6,#e6e6e6);
  border:3px solid #000;

  font-weight:600;
  font-size:14px;
  cursor:pointer;

  box-shadow:4px 4px 0 #000;
  transition:transform 0.2s ease;
}


/* arrow */
.back-icon{
  font-size:18px;
  line-height:1;
}
.back-icon{
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.back-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
  pointer-events:none;
}

/* hover / tap */
.back-btn:hover{
  transform:translate(-2px,-2px);
}

.back-btn:active{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 #000;
}

/* 🌙 NIGHT MODE (still colorful) */
body.dark .back-btn{
  background:linear-gradient(135deg,#e6e6e6,#e6e6e6);
}


</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
  
  <span class="logo-text">RANJIT</span>
</div>

  <div class="toggle-ios">
  <input type="checkbox" id="themeToggle" onclick="toggleMode()">
  <label for="themeToggle"></label>
</div>

</div>

<!-- MAIN -->
<div class="main">
  <div class="tabs">

    <div class="big-tab nano" onclick="openNano()">
      <div class="tab-text">
         Nano Banana
        <span>Fun & stylized prompt collection</span>
      </div>
     <div class="tab-icon">
  <img src="icons/nano2.png" alt="Nano Icon">
</div>

    </div>

    <div class="big-tab chatgpt" onclick="openChatGPT()">
      <div class="tab-text">
         Chat-GPT
        <span>High-quality AI image prompts</span>
      </div>
     <div class="tab-icon">
  <img src="icons/chatgpt.png" alt="ChatGPT Icon">
</div>

    </div>

  </div>
</div>

<!-- ABOUT BUTTON -->
<button class="back-btn" onclick="goAbout()">
  <span class="back-icon"> <img src="icons/about2.png" alt="About"></span>
  <span class="back-text">About</span>
</button>

<script>
function copyPrompt(id, btn){
  navigator.clipboard.writeText(
    document.getElementById(id).innerText
  );

  btn.innerText = "✅ Copied!";
  btn.classList.add("copied");

  setTimeout(()=>{
    btn.innerText = "📋 Copy Prompt";
    btn.classList.remove("copied");
  },1200);
}

function toggleMode(){
  document.body.classList.toggle("dark");
}

function goAbout(){
  window.location.href = "about.html";
}
function openNano(){
  window.location.href = "nano.html";
}
function openChatGPT(){
  window.location.href = "chat.html";
}

function toggleMode(){
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
}

(function(){
  const savedTheme = localStorage.getItem("theme");
  if(savedTheme === "dark"){
    document.body.classList.add("dark");
    const toggle = document.getElementById("themeToggle");
    if(toggle) toggle.checked = true;
  }
})();

</script>

</body>
</html>
